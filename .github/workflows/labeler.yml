name: "Labeler"

on:
  pull_request_target:
    types: [opened, edited, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  labeler:
    name: Apply labels
    runs-on: ubuntu-latest
    steps:
      - name: Run Multi-Labeler
        uses: fuxingloh/multi-labeler@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
